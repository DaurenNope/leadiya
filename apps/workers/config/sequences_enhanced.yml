# Professional Outreach Sequences
# Based on Hormozi $100M Offers frameworks
# Hook → Problem → Agitate → Solution → CTA structure
# Value-first, objection isolation, social proof

sequences:
  # ELITE COLD OUTREACH - Value-first with authority positioning
  cold_outreach_elite:
    trigger: qualified_lead
    steps:
      # STEP 1: The Hook - Curiosity + Authority
      - id: whatsapp_hook
        delay: 0
        channel: whatsapp
        template: |
          {{first_name}}, заметил {{company}} — впечатляет масштаб.
          
          Большинство компаний в {{industry}} теряют до 30% прибыли на ручных процессах, которые можно автоматизировать за 2 недели.
          
          Увидел 3 конкретных момента, где {{company}} может сэкономить 200+ часов в месяц.
          
          Интересно узнать? Ответьте "да" — пришу разбор.

      # STEP 2: The Value Bomb - Proof + Specificity
      - id: whatsapp_value
        delay: 2d
        channel: whatsapp
        condition: no_response
        template: |
          {{first_name}}, вот конкретно что я заметил:
          
          1. Повторяющиеся операции → можно передать системе
          2. Ручная обработка заказов → автоматизация сэкономит 40+ часов/мес
          3. Нет связки 1С с сайтом → двойная работа, ошибки, потери
          
          Мы внедрили такое для [Похожая компания] в {{city}} — они вышли на +15% чистой прибыли за квартал.
          
          Могу показать пример реализации для {{company}}.
          
          У вас есть 15 минут завтра или послезавтра?

      # STEP 3: Social Proof + Soft CTA
      - id: whatsapp_social
        delay: 4d
        channel: whatsapp
        condition: no_response
        template: |
          {{first_name}}, кратко — за последний месяц:
          
          • ТОО "ЛогистикПро" — сократили обработку заказов с 4 часов до 20 минут
          • Асель Торг — автоматизировали склад, убрали пересортицу
          • ГолдСтоун — интеграция 1С + Kaspi + WhatsApp
          
          Все ROI в первый месяц.
          
          Если автоматизация сейчас не приоритет — просто ответьте "нет", не буду беспокоить.
          
          Если интересно — напишите "покажи".

      # STEP 4: Email Deep Dive
      - id: email_deep
        delay: 6d
        channel: email
        condition: no_response
        template: |
          Тема: {{company}} — экономия 2.4 млн тенге в год
          
          {{first_name}}, добрый день.
          
          Последнее письмо — наверное, WhatsApp удобнее для быстрых сообщений.
          
          Но вот что важно:
          
          Расчитали для компаний {{industry}} среднего размера:
          
          Ручные процессы стоят вам ≈ 200,000 тг/мес скрытыми затратами
          × 12 мес = 2,400,000 тг в год
          
          Внедрение автоматизации: 800,000 - 1,200,000 тг один раз
          
          Чистая экономия год 1: 1.2 - 1.6 млн тг
          Год 2+: 2.4 млн тг (уже без затрат на внедрение)
          
          Экономика очевидна. Вопрос только в готовности к изменениям.
          
          Давайте созвонимся — я покажу точный расчёт для {{company}}.
          
          15 минут, завтра или в четверг?
          
          {{signature}}

      # STEP 5: Final attempt - The Choice Close
      - id: whatsapp_final
        delay: 8d
        channel: whatsapp
        condition: no_response
        template: |
          {{first_name}}, понимаю — много предложений, мало времени.
          
          Последнее сообщение, обещаю.
          
          Варианты:
          
          А) "Пришли расчёт" — пришлю конкретные цифры экономии для {{company}}
          Б) "Покажи пример" — скину кейс похожей компании (не конкурента)
          В) "Нет" — удалю из списка, не буду писать
          
          Ваш ответ?

  # PRICE OBJECTION SEQUENCE - Handle "too expensive"
  objection_price:
    trigger: price_objection
    steps:
      - id: isolate_objection
        delay: 0
        channel: whatsapp
        template: |
          Понял, {{first_name}}.
          
          Уточню — если бы цена была комфортной, вы бы двинулись дальше?
          
          (Просто понять, это единственный вопрос или есть другие)

      - id: reframe_value
        delay: 1h
        channel: whatsapp
        condition: isolated_objection
        template: |
          Хорошо. Тогда вот как думаю:
          
          Сейчас вы платите 200,000+ тг/мес на ручные процессы (это не счётчик, это время сотрудников × ставка + ошибки)
          
          Наше решение: 1,000,000 тг разово
          Экономия: 200,000 тг/мес
          
          Окупаемость: 5 месяцев
          Чистая выгода 5 мес +: 200,000 × 7 = 1,400,000 тг
          
          Год 2: +2,400,000 тг
          
          Дорого — не делать это. Всё остальное — инвестиция с 240% ROI.

      - id: reduce_risk
        delay: 2d
        channel: whatsapp
        condition: no_response
        template: |
          {{first_name}}, предлагаю так:
          
          Начнём с пилота на одном процессе — 200,000 тг.
          Увидите результат за неделю.
          
          Потом решите — масштабировать или нет.
          
          Минимальный риск, понятный результат.
          
          Готовы обсудить, какой процесс автоматизируем первым?

  # TIMELINE OBJECTION SEQUENCE - Handle "not now"
  objection_timing:
    trigger: timing_objection
    steps:
      - id: urgency_without_desperation
        delay: 0
        channel: whatsapp
        template: |
          Понимаю, {{first_name}} — всегда кажется, что "потом" будет время.
          
          Реальность: когда станет лучше? Через месяц? Квартал?
          
          А за это время:
          • Сотрудники продолжат тратить 40% времени на рутину
          • Ошибки ручного ввода = потери
          • Конкуренты, которые автоматизировались раньше, уходят вперёд
          
          Вопрос не "когда удобно", а "сколько это стоит каждый день ожидания".
          
          Можем созвониться хотя бы на 10 минут — я покажу конкретные цифры.

  # DECISION MAKER SEQUENCE - When contact is not decision maker
  decision_maker:
    trigger: not_decision_maker
    steps:
      - id: get_introduction
        delay: 0
        channel: whatsapp
        template: |
          Понял, спасибо за честность!
          
          Кто принимает решения по автоматизации и цифровизации у вас?
          
          Могу сам написать/позвонить — или лучше, если вы познакомите?
          
          Если перешлёте мой контакт — могу предложить бонус за успешную рекомендацию 🙏

      - id: provide_ammo
        delay: 2d
        channel: whatsapp
        condition: no_response
        template: |
          Подготовил для руководства краткое резюме:
          
          "Rahmet Labs предлагает автоматизацию {{company}}:
          • Экономия: 200,000 тг/мес
          • Окупаемость: 5 месяцев
          • Срок внедрения: 2-4 недели
          • Без остановки текущей работы
          
          Созвон на 15 минут: {{calendar_url}}"
          
          Можете переслать? Или лучше я напишу напрямую — к кому обратиться?

  # COMPETITOR SEQUENCE - When they use competitor
  competitor_win:
    trigger: has_competitor
    steps:
      - id: differentiate
        delay: 0
        channel: whatsapp
        template: |
          Отлично! Значит проблема уже понятна — автоматизация нужна.
          
          Вопрос: насколько текущее решение закрывает потребности?
          
          Часто слышим:
          • "Сайт есть, но не интегрирован с 1С"
          • "Автоматизация есть, но сложная, сотрудники не пользуются"
          • "Обслуживание дорогое и медленное"
          
          Если есть боли с текущим решением — могу показать, как у нас по-другому.
          
          Бесплатный аудит текущей системы — найдём слабые места.

  # FOLLOW-UP SEQUENCES
  warm_followup:
    trigger: warm_lead
    steps:
      - id: nudge_decision
        delay: 3d
        channel: whatsapp
        template: |
          {{first_name}}, привет!
          
          Какие вопросы остались по нашему разговору?
          
          Часто тормозят:
          • Бюджет → можем этапами, первый шаг от 200к
          • Сроки → пилот за неделю
          • Сложность → обучаем, поддержка 3 мес в подарок
          
          Что из этого про {{company}}?

      - id: scarcity_soft
        delay: 5d
        channel: whatsapp
        condition: no_response
        template: |
          {{first_name}}, откровенно — мы берём 2-3 проекта в месяц, чтобы качество было высоким.
          
          Сейчас слоты на февраль — март заполняются.
          
          Если {{company}} планирует автоматизацию в Q1 — лучше зафиксировать сейчас.
          
          Без предоплаты, просто бронирование места в очереди.
          
          Интересно?

  # REFERRAL SEQUENCE
  referral_request:
    trigger: happy_client
    steps:
      - id: ask_referral
        delay: 14d
        channel: whatsapp
        template: |
          {{first_name}}, рад что проект запущен и работает! 🎉
          
          Вопрос: есть знакомые в {{industry}} или смежных сферах, кому тоже нужна автоматизация?
          
          Готов предложить:
          • Им — бесплатный аудит (обычно 150,000 тг)
          • Вам — 10% от первого проекта или месяц поддержки бесплатно
          
          Кого можете порекомендовать?

# Response handling - Enhanced with sales psychology
responses:
  # Objection detection patterns
  objections:
    price:
      triggers: ["дорого", "дорого", "нет бюджета", "цену", "дешевле", "скидка", "expensive", "price"]
      sequence: objection_price
      
    timing:
      triggers: ["позже", "не сейчас", "через", "следующий", "later", "not now", "next quarter"]
      sequence: objection_timing
      
    not_decision_maker:
      triggers: ["не решаю", "директор", "начальник", "руководитель", "не я", "boss", "manager"]
      sequence: decision_maker
      
    competitor:
      triggers: ["уже есть", "другой", "конкурент", "платформа", "система", "already have", "using"]
      sequence: competitor_win

  # Positive signals - Advanced qualification
  positive_signals:
    hot:
      - "готовы"
      - "давайте"
      - "когда"
      - "как начать"
      - "покажи"
      - "примеры"
      - "созвонимся"
      - "встреча"
      - "ready"
      - "let's do it"
      - "when can we"
      
    warm:
      - "интересно"
      - "расскажите"
      - "подробнее"
      - "как это работает"
      - "interesting"
      - "tell me more"

  # Auto-replies with Hormozi frameworks
  auto_replies:
    pricing_enhanced:
      trigger: ["сколько", "цена", "стоимость", "цену", "бюджет"]
      response: |
        {{first_name}}, точная цена после 10-минутного разговора — проекты разные.
        
        Но ориентир для {{industry}}:
        • Пилотный проект: от 200,000 тг
        • Полная автоматизация: 800,000 - 2,000,000 тг
        
        Главное не цена, а ROI:
        Средняя экономия клиентов: 200,000 тг/мес
        Окупаемость: 4-6 месяцев
        
        Созвонимся — я посчитаю точно для {{company}}?

    how_it_works:
      trigger: ["как работает", "что делаете", "в чем суть", "подробнее"]
      response: |
        Мы автоматизируем бизнес-процессы:
        
        1. Аудит: находим что тратит время/деньги
        2. Решение: разрабатываем систему под вас
        3. Внедрение: запускаем, обучаем, интегрируем с 1С/Kaspi
        4. Поддержка: 3 месяца включены
        
        Примеры:
        • ТОО "ЛогистикПро": обработка заказов с 4ч → 20 мин
        • Асель Торг: складская автоматизация, -90% ошибок
        
        Какой процесс у вас болит больше всего?

    meeting_request:
      trigger: ["созвон", "встреча", "позвонить", "встретиться", "call", "meeting"]
      response: |
        Отлично! 📞
        
        Давайте созвонимся — 15 минут, я:
        • Разберу ваши текущие процессы
        • Покажу конкретные возможности экономии
        • Отвечу на вопросы
        
        Когда удобно?
        Сегодня 16:00 или завтра 11:00?
        
        Или выберите в календаре: {{calendar_url}}
