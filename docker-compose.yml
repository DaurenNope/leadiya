# Leadiya SaaS — Docker Compose for production deployment.
#
# Required: .env with DATABASE_URL, REDIS_URL, SUPABASE_*, VITE_SUPABASE_*
# 
#   docker compose up --build -d
#   open http://localhost:8080
#
# API health: curl http://localhost:3001/health

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: "3001"
    restart: unless-stopped

  workers:
    build:
      context: .
      target: workers
    env_file: .env
    environment:
      WHATSAPP_BAILEYS_AUTH_DIR: /app/data/baileys-auth
    volumes:
      - wa-auth:/app/data/baileys-auth
    depends_on:
      - api
    restart: unless-stopped

  dashboard:
    build:
      context: .
      target: dashboard
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_PUBLIC_API_ORIGIN: ${VITE_PUBLIC_API_ORIGIN:-}
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  wa-auth:
